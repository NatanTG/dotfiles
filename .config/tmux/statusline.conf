# vim: ft=tmux
set -g mode-style "fg=#eee8d5,bg=#073642"

set -g message-style "fg=#eee8d5,bg=#073642"
set -g message-command-style "fg=#eee8d5,bg=#073642"

set -g pane-border-style "fg=#073642"
set -g pane-active-border-style "fg=#eee8d5"

set -g status "on"
set -g status-interval 1
set -g status-justify "left"

set -g status-style "fg=#586e75,bg=#002b36"
set -g status-bg "#002b36"

set -g status-left-length "100"
set -g status-right-length "100"

set -g status-left-style NONE
set -g status-right-style NONE

# Left: session > user > window index
set -g status-left "#[fg=#002b36,bg=#b58900,bold] #S #[fg=#b58900,bg=#93a1a1]#[fg=#002b36,bg=#93a1a1,bold] #(whoami) #[fg=#93a1a1,bg=#586e75]#[fg=#eee8d5,bg=#586e75] #I #[fg=#586e75,bg=#002b36] "

# Right: hostname
set -g status-right "#[fg=#586e75,bg=#002b36]#[fg=#eee8d5,bg=#586e75] #h "

setw -g window-status-activity-style "underscore,fg=#839496,bg=#002b36"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#839496,bg=#002b36"

# Inactive window
setw -g window-status-format "  #[fg=#839496]#I #W  "

# Active window with arrows
setw -g window-status-current-format "#[fg=#002b36,bg=#b58900]#[fg=#002b36,bg=#b58900,bold] #I #W #[fg=#b58900,bg=#002b36]"
